<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stack Deployer — Generador</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, 'Segoe UI', monospace; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #58a6ff; font-size: 1.8rem; margin-bottom: .3rem; }
  p.sub { color: #8b949e; margin-bottom: 2rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  h2 { font-size: 1.1rem; color: #f0f6fc; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid #21262d; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  label { display: block; font-size: .85rem; color: #8b949e; margin-bottom: .3rem; }
  input, select { width: 100%; padding: .6rem .8rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: .9rem; }
  input:focus, select:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,.3); }
  .checkbox-group { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
  .checkbox-group input[type=checkbox] { width: auto; }
  textarea { width: 100%; height: 400px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: .8rem; padding: 1rem; font-family: monospace; white-space: pre; tab-size: 2; resize: vertical; margin-top: .5rem; }
  textarea:focus { outline: none; border-color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; padding: .7rem 2rem; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; margin-top: .5rem; }
  button:hover { background: #2ea043; }
  button.secondary { background: #21262d; color: #c9d1d9; margin-left: .5rem; }
  button.secondary:hover { background: #30363d; }
  .actions { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  #status { margin-top: .5rem; font-size: .85rem; min-height: 1.5rem; }
  .copy-ok { color: #3fb950; }
  .copy-err { color: #f85149; }
</style>
</head>
<body>
<div class="container">
  <h1>&#9881; AI Stack Deployer</h1>
  <p class="sub">Genera un script de instalaci&oacute;n personalizado para tu stack de IA local en Ubuntu</p>

  <div class="card">
    <h2>Puertos</h2>
    <div class="grid">
      <div>
        <label for="llama_port">llama.cpp API</label>
        <input type="number" id="llama_port" value="3000" min="1024" max="65535">
      </div>
      <div>
        <label for="webui_port">Open WebUI</label>
        <input type="number" id="webui_port" value="8080" min="1024" max="65535">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Modelo</h2>
    <div class="grid">
      <div>
        <label for="hf_repo">Repositorio HuggingFace</label>
        <input type="text" id="hf_repo" value="Qwen/Qwen2.5-Coder-14B-Instruct-GGUF">
      </div>
      <div>
        <label for="model_name">Nombre del archivo GGUF</label>
        <input type="text" id="model_name" value="qwen2.5-coder-14b-instruct-q4_k_m.gguf">
      </div>
    </div>
    <div class="grid" style="margin-top:.8rem">
      <div>
        <label for="model_size">Tama&ntilde;o aprox. (GB)</label>
        <input type="number" id="model_size" value="9" min="1" max="200" step="0.5">
      </div>
      <div>
        <label for="ctx_size">Contexto (tokens)</label>
        <input type="number" id="ctx_size" value="4096" min="512" max="131072" step="512">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Hardware</h2>
    <div class="grid">
      <div>
        <label for="cpu_threads">Threads CPU (0 = auto: nproc-1)</label>
        <input type="number" id="cpu_threads" value="0" min="0" max="128">
      </div>
      <div>
        <label for="vram_threshold">VRAM m&iacute;nima para offload total (MB)</label>
        <input type="number" id="vram_threshold" value="10240" min="1024" max="262144" step="1024">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Componentes</h2>
    <div class="grid">
      <div class="checkbox-group">
        <input type="checkbox" id="enable_gpu" checked>
        <label for="enable_gpu" style="margin:0">Soporte GPU NVIDIA (CDI)</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="enable_rag" checked>
        <label for="enable_rag" style="margin:0">B&uacute;squeda web (SearXNG + RAG)</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="enable_opencode" checked>
        <label for="enable_opencode" style="margin:0">Instalar OpenCode CLI</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="enable_firewall" checked>
        <label for="enable_firewall" style="margin:0">Configurar firewall (UFW)</label>
      </div>
    </div>
  </div>

  <div class="actions">
    <button onclick="generate()">Generar script</button>
    <button class="secondary" onclick="copyScript()">Copiar al portapapeles</button>
    <button class="secondary" onclick="downloadScript()">Descargar</button>
  </div>
  <div id="status"></div>

  <textarea id="output" readonly placeholder="El script generado aparecer&aacute; aqu&iacute;..."></textarea>
</div>

<script>
// Build each section as a plain string (NO nested template literals)
// Each function returns the bash code for that section, or empty string if disabled

function buildHeader(p) {
  var h = [
    '#!/usr/bin/env bash',
    '# ==============================================================================',
    '# AI STACK DEPLOYER — Generado el ' + new Date().toISOString().slice(0,10),
    '# ==============================================================================',
    '# PUERTOS      : llama.cpp=' + p.llama_port + '  Open WebUI=' + p.webui_port,
    '# MODELO       : ' + p.model_name + ' (~' + p.model_size + ' GB)',
    '# CONTEXTO     : ' + p.ctx_size + ' tokens',
    '# GPU          : ' + (p.gpu ? 'SÍ (NVIDIA CDI, umbral ' + p.vram_thr + ' MB)' : 'NO (solo CPU)'),
    '# RAG          : ' + (p.rag ? 'SÍ (SearXNG)' : 'NO'),
    '# OPENCODE CLI : ' + (p.opencode ? 'SÍ' : 'NO'),
    '# FIREWALL     : ' + (p.firewall ? 'SÍ (UFW)' : 'NO'),
    '# ==============================================================================',
    'set -euo pipefail',
    '',
    'RED="\\033[1;31m"; GREEN="\\033[1;32m"; YELLOW="\\033[1;33m"',
    'BLUE="\\033[1;34m"; CYAN="\\033[1;36m"; NC="\\033[0m"',
    'log_info()    { echo -e "${CYAN}[INFO]${NC} $1"; }',
    'log_install() { echo -e "${BLUE}[INSTALANDO]${NC} $1"; }',
    'log_ok()      { echo -e "${GREEN}[OK]${NC} $1"; }',
    'log_warn()    { echo -e "${YELLOW}[AVISO]${NC} $1"; }',
    'log_error()   { echo -e "${RED}[ERROR]${NC} $1" >&2; }',
    '',
    'if [[ ${EUID} -ne 0 ]]; then log_error "Ejecutar con sudo: sudo $0"; exit 1; fi',
    '',
    'TARGET_USER="${SUDO_USER:-${USER}}"',
    'if [[ -z "${TARGET_USER}" || "${TARGET_USER}" == "root" ]]; then',
    '  TARGET_USER="root"; TARGET_HOME="/root"',
    'else',
    '  TARGET_HOME=$(getent passwd "${TARGET_USER}" | cut -d: -f6)',
    'fi',
    '',
    'INSTALL_DIR="${TARGET_HOME}/ai-stack"',
    'MODELS_DIR="${INSTALL_DIR}/models"',
    'SEARXNG_DIR="${INSTALL_DIR}/searxng"',
    'COMPOSE_FILE="${INSTALL_DIR}/podman-compose.yml"',
    'SYSTEMD_SVC="/etc/systemd/system/ai-stack.service"',
    '',
    'MODEL_NAME="' + p.model_name + '"',
    'HF_REPO="' + p.hf_repo + '"',
    'MODEL_URL="https://huggingface.co/' + p.hf_repo + '/resolve/main/' + p.model_name + '?download=true"',
    'MODEL_SIZE_GB=' + p.model_size,
    '',
    'LLAMA_PORT=' + p.llama_port,
    'WEBUI_PORT=' + p.webui_port,
    'CTX_SIZE=' + p.ctx_size,
    'VRAM_THRESHOLD=' + p.vram_thr,
    '',
    'CPU_THREADS=$(nproc)',
    'CPU_THREADS=$((CPU_THREADS > 1 ? CPU_THREADS - 1 : 1))',
  ].join('\n');
  if (p.cpu_threads > 0) {
    h += '\nCPU_THREADS=' + p.cpu_threads;
  }
  h += [
    '',
    'HAS_NVIDIA_GPU=0; GPU_VRAM_MB=0; GPU_LAYERS=0; NEEDS_REBOOT=0',
    '',
  ].join('\n');
  return h;
}

function buildDetectGpu() {
  return [
    'detect_gpu() {',
    '  if ! command -v lspci >/dev/null 2>&1; then',
    '    apt-get update -qq 2>/dev/null || true',
    '    apt-get install -y -qq pciutils >/dev/null 2>&1 || true',
    '  fi',
    '  if lspci 2>/dev/null | grep -qiE \'nvidia.*(vga|3d|display)\'; then',
    '    HAS_NVIDIA_GPU=1; log_info "GPU NVIDIA detectada."',
    '    if command -v nvidia-smi >/dev/null 2>&1; then',
    '      GPU_VRAM_MB=$(nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits 2>/dev/null | head -n1 | tr -d \' \' || echo 0)',
    '      log_info "VRAM: ${GPU_VRAM_MB} MB"',
    '    fi',
    '  else',
    '    log_warn "Sin GPU NVIDIA. Modo CPU."; HAS_NVIDIA_GPU=0; GPU_VRAM_MB=0',
    '  fi',
    '}',
    '',
    'calculate_gpu_layers() {',
    '  if [[ "${HAS_NVIDIA_GPU}" == "0" ]]; then GPU_LAYERS=0; return; fi',
    '  if [[ "${GPU_VRAM_MB}" -ge "${VRAM_THRESHOLD}" ]]; then',
    '    GPU_LAYERS=-1; log_info "Offload completo (GPU_LAYERS=-1)"',
    '  else',
    '    GPU_LAYERS=0; log_warn "VRAM < ${VRAM_THRESHOLD} MB. Modo CPU."',
    '  fi',
    '}',
  ].join('\n');
}

function buildInstallPackages(p) {
  var pkgs = ['curl','git','jq','ca-certificates','gnupg','python3-pip','pipx','podman','uidmap','slirp4netns','fuse-overlayfs','pciutils'];
  if (p.firewall) pkgs.push('ufw');
  var s = [
    'install_packages() {',
    '  log_info "Actualizando APT..."',
    '  apt-get update -qq',
    '  local pkgs=(' + pkgs.join(' ') + ')',
    '  for pkg in "${pkgs[@]}"; do',
    '    if ! dpkg -s "${pkg}" >/dev/null 2>&1; then',
    '      if [[ "${pkg}" == "uidmap" ]] && ! apt-cache show uidmap >/dev/null 2>&1; then',
    '        apt-get install -y -qq shadow; continue',
    '      fi',
    '      apt-get install -y -qq "${pkg}"',
    '    fi',
    '  done',
    '}',
  ].join('\n');
  return s;
}

function buildPodmanCompose() {
  return [
    'install_podman_compose() {',
    '  command -v podman-compose >/dev/null 2>&1 && return 0',
    '  if apt-cache show podman-compose >/dev/null 2>&1; then',
    '    apt-get install -y -qq podman-compose',
    '    command -v podman-compose >/dev/null 2>&1 && ln -sf "$(command -v podman-compose)" /usr/local/bin/podman-compose 2>/dev/null || true',
    '  else',
    '    pipx install --include-deps podman-compose',
    '    for b in /root/.local/bin/podman-compose "${TARGET_HOME}/.local/bin/podman-compose"; do',
    '      [[ -f "$b" ]] && { ln -sf "$b" /usr/local/bin/podman-compose; break; }',
    '    done',
    '  fi',
    '  command -v podman-compose >/dev/null 2>&1 || { log_error "podman-compose no instalado"; exit 1; }',
    '}',
  ].join('\n');
}

function buildUpgradePodman() {
  return [
    'upgrade_podman_for_cdi() {',
    '  [[ "${HAS_NVIDIA_GPU}" == "0" ]] && return 0',
    '  local major=$(podman version --format \'{{.Version}}\' 2>/dev/null | cut -d. -f1); major=${major:-0}',
    '  [[ "${major}" -ge 4 ]] && { log_ok "Podman ${major}.x compatible CDI"; return 0; }',
    '  log_warn "Podman ${major}.x no soporta CDI. Actualizando..."',
    '  local v; v=$(source /etc/os-release && echo "${VERSION_ID}")',
    '  [[ "${v}" != "22.04" ]] && { log_warn "Ubuntu ${v} no soportado. Modo CPU."; HAS_NVIDIA_GPU=0; GPU_LAYERS=0; return 0; }',
    '  mkdir -p /etc/apt/keyrings',
    '  curl -fsSL "https://download.opensuse.org/repositories/devel:/kubic:/libcontainers:/stable/xUbuntu_${v}/Release.key" \\',
    '    | gpg --dearmor --yes -o /etc/apt/keyrings/devel_kubic_libcontainers_stable.gpg || { HAS_NVIDIA_GPU=0; GPU_LAYERS=0; return 0; }',
    '  echo "deb [signed-by=/etc/apt/keyrings/devel_kubic_libcontainers_stable.gpg] https://download.opensuse.org/repositories/devel:/kubic:/libcontainers:/stable/xUbuntu_${v}/ /" \\',
    '    > /etc/apt/sources.list.d/devel:kubic:libcontainers:stable.list',
    '  apt-get update -qq && apt-get install -y -qq podman',
    '  log_ok "Podman actualizado: $(podman version --format \'{{.Version}}\')"',
    '}',
  ].join('\n');
}

function buildNvidiaDrivers() {
  return [
    'install_nvidia_drivers() {',
    '  [[ "${HAS_NVIDIA_GPU}" == "0" ]] && return 0',
    '  command -v nvidia-smi >/dev/null 2>&1 && return 0',
    '  apt-get install -y -qq ubuntu-drivers-common',
    '  ubuntu-drivers autoinstall; NEEDS_REBOOT=1',
    '}',
  ].join('\n');
}

function buildNvidiaCtk() {
  return [
    'install_nvidia_container_toolkit() {',
    '  [[ "${HAS_NVIDIA_GPU}" == "0" ]] && return 0',
    '  command -v nvidia-ctk >/dev/null 2>&1 && return 0',
    '  curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \\',
    '    | gpg --dearmor --yes -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg',
    '  curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \\',
    '    | sed \'s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g\' \\',
    '    > /etc/apt/sources.list.d/nvidia-container-toolkit.list',
    '  apt-get update -qq && apt-get install -y -qq nvidia-container-toolkit',
    '  mkdir -p /etc/cdi',
    '  nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml 2>/dev/null || { HAS_NVIDIA_GPU=0; GPU_LAYERS=0; }',
    '}',
  ].join('\n');
}

function buildSearxng() {
  return [
    'configure_searxng() {',
    '  local f="${SEARXNG_DIR}/settings.yml"; [[ -f "$f" ]] && return 0',
    '  cat > "$f" << \'SRX\'',
    'search:',
    '  safe_search: 1',
    '  autocomplete: "duckduckgo"',
    '  formats: [html, json]',
    'server:',
    '  port: 8080',
    '  bind_address: "0.0.0.0"',
    '  secret_key: "cambia-esta-clave-en-produccion-2026"',
    '  image_proxy: true',
    'engines:',
    '  - name: duckduckgo',
    '    engine: duckduckgo',
    '    shortcut: ddg',
    '  - name: wikipedia',
    '    engine: wikipedia',
    '    shortcut: wp',
    '    language: "es"',
    'SRX',
    '  chown "${TARGET_USER}:${TARGET_USER}" "$f" 2>/dev/null || true',
    '}',
  ].join('\n');
}

function buildCompose(p) {
  var searxngBlock = p.rag ? [
    '',
    '  searxng:',
    '    image: docker.io/searxng/searxng:latest',
    '    container_name: ai-stack-searxng',
    '    restart: unless-stopped',
    '    volumes:',
    '      - ./searxng:/etc/searxng:z',
    '    networks:',
    '      - ai-net',
  ].join('\n') : '';

  var gpuBlock = '';
  var flashBlock = '';
  var llamaImage = 'ghcr.io/ggml-org/llama.cpp:server';
  if (p.gpu) {
    gpuBlock = [
      '    devices:',
      '      - "nvidia.com/gpu=all"',
      '    security_opt:',
      '      - "label=disable"',
    ].join('\n');
    flashBlock = '      - "--flash-attn"';
    llamaImage = 'ghcr.io/ggml-org/llama.cpp:server-cuda';
  }

  var ragEnv = p.rag ? [
    '      - ENABLE_RAG_WEB_SEARCH=True',
    '      - RAG_WEB_SEARCH_ENGINE=searxng',
    '      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json',
  ].join('\n') : '';
  var ragDepends = p.rag ? '\n      - searxng' : '';

  return [
    'generate_compose() {',
    '  [[ -f "${COMPOSE_FILE}" ]] && return 0',
    '  cat > "${COMPOSE_FILE}" << EOF',
    'services:',
    '  llama-cpp:',
    '    image: ' + llamaImage,
    '    container_name: ai-stack-llama-cpp',
    '    restart: unless-stopped',
    '    ports:',
    '      - "${LLAMA_PORT}:8080"',
    '    volumes:',
    '      - ./models:/models:z',
    gpuBlock,
    '    command:',
    '      - "--model"',
    '      - "/models/${MODEL_NAME}"',
    '      - "--host"',
    '      - "0.0.0.0"',
    '      - "--port"',
    '      - "8080"',
    '      - "--threads"',
    '      - "${CPU_THREADS}"',
    '      - "--n-gpu-layers"',
    '      - "${GPU_LAYERS}"',
    '      - "--ctx-size"',
    '      - "' + p.ctx_size + '"',
    '      - "--alias"',
    '      - "llm-model"',
    '      - "--cont-batching"',
    flashBlock,
    '    networks:',
    '      - ai-net',
    searxngBlock,
    '',
    '  open-webui:',
    '    image: ghcr.io/open-webui/open-webui:main',
    '    container_name: ai-stack-open-webui',
    '    restart: unless-stopped',
    '    ports:',
    '      - "${WEBUI_PORT}:8080"',
    '    environment:',
    '      - OPENAI_API_BASE_URL=http://llama-cpp:8080/v1',
    '      - OPENAI_API_KEY=sk-local-no-auth-required',
    ragEnv,
    '      - WEBUI_AUTH=False',
    '      - DEFAULT_MODELS=llm-model',
    '    volumes:',
    '      - open-webui-data:/app/backend/data:z',
    '    depends_on:',
    '      - llama-cpp' + ragDepends,
    '    networks:',
    '      - ai-net',
    '',
    'volumes:',
    '  open-webui-data:',
    '',
    'networks:',
    '  ai-net:',
    '    driver: bridge',
    'EOF',
    '  chown "${TARGET_USER}:${TARGET_USER}" "${COMPOSE_FILE}" 2>/dev/null || true',
    '}',
  ].join('\n');
}

function buildSystemdService() {
  return [
    'create_systemd_service() {',
    '  [[ -f "${SYSTEMD_SVC}" ]] && return 0',
    '  cat > "${SYSTEMD_SVC}" << SYS',
    '[Unit]',
    'Description=AI Stack local (llama.cpp + Open WebUI + SearXNG) via Podman',
    'After=network-online.target',
    'Wants=network-online.target',
    '',
    '[Service]',
    'Type=oneshot',
    'RemainAfterExit=yes',
    'WorkingDirectory=${INSTALL_DIR}',
    'Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"',
    'ExecStartPre=podman-compose -f ${COMPOSE_FILE} pull',
    'ExecStart=podman-compose -f ${COMPOSE_FILE} up -d --remove-orphans',
    'ExecStop=podman-compose -f ${COMPOSE_FILE} down',
    'TimeoutStartSec=900',
    '',
    '[Install]',
    '# WantedBy omitido: arranque manual exclusivo',
    'SYS',
    '  systemctl daemon-reload',
    '  systemctl is-enabled ai-stack.service >/dev/null 2>&1 && systemctl disable ai-stack.service 2>/dev/null || true',
    '}',
  ].join('\n');
}

function buildOpenCode(p) {
  if (!p.opencode) return 'install_opencode() { :; }';
  return [
    'install_opencode() {',
    '  command -v opencode >/dev/null 2>&1 && return 0',
    '  curl -fsSL https://opencode.ai/install | OPENCODE_INSTALL_DIR=/usr/local/bin bash || return 0',
    '  local cfg="${TARGET_HOME}/.config/opencode"',
    '  mkdir -p "$cfg"',
    '  if [[ ! -f "$cfg/opencode.json" ]]; then',
    '    cat > "$cfg/opencode.json" << JSON',
    '{',
    '  "$schema": "https://opencode.ai/config.json",',
    '  "provider": {',
    '    "llama-local": {',
    '      "name": "llama.cpp local",',
    '      "npm": "@ai-sdk/openai-compatible",',
    '      "options": { "baseURL": "http://localhost:${LLAMA_PORT}/v1" },',
    '      "models": { "llm-model": { "name": "${MODEL_NAME}" } }',
    '    }',
    '  },',
    '  "model": "llama-local/llm-model",',
    '  "autoupdate": false',
    '}',
    'JSON',
    '  fi',
    '  if [[ ! -f "$cfg/auth.json" ]]; then',
    '    echo \'{"llama-local":"sk-local-no-auth-required"}\' > "$cfg/auth.json"',
    '  fi',
    '  chown -R "${TARGET_USER}:${TARGET_USER}" "$cfg" 2>/dev/null || true',
    '}',
  ].join('\n');
}

function buildFirewall(p) {
  if (!p.firewall) return 'configure_ufw() { :; }';
  return [
    'configure_ufw() {',
    '  command -v ufw >/dev/null 2>&1 || return 0',
    '  ufw default deny incoming >/dev/null 2>&1 || true',
    '  ufw default allow outgoing >/dev/null 2>&1 || true',
    '  ufw allow ssh comment \'SSH\' >/dev/null 2>&1 || true',
    '  ufw --force enable 2>/dev/null || true',
    '  local subnet; subnet=$(ip route | grep -m1 \'scope link\' | awk \'{print $1}\' || true)',
    '  if [[ -n "$subnet" && "$subnet" != *"0.0.0.0"* ]]; then',
    '    ufw allow from "$subnet" to any port "${WEBUI_PORT}" proto tcp >/dev/null 2>&1 || true',
    '    ufw allow from "$subnet" to any port "${LLAMA_PORT}" proto tcp >/dev/null 2>&1 || true',
    '  else',
    '    ufw allow "${WEBUI_PORT}"/tcp >/dev/null 2>&1 || true',
    '    ufw allow "${LLAMA_PORT}"/tcp >/dev/null 2>&1 || true',
    '  fi',
    '}',
  ].join('\n');
}

function buildDownloadModel() {
  return [
    'download_model() {',
    '  local mp="${MODELS_DIR}/${MODEL_NAME}"',
    '  [[ -f "$mp" ]] && { local s=$(du -m "$mp" | cut -f1); [[ "$s" -gt 500 ]] && { log_skip "Modelo ya descargado (${s} MB)"; return 0; }; rm -f "$mp"; }',
    '  log_install "Descargando ${MODEL_NAME} (~${MODEL_SIZE_GB} GB)..."',
    '  curl -C - -L --fail --progress-bar "${MODEL_URL}" -o "$mp" || { rm -f "$mp"; log_error "Descarga fallida"; exit 1; }',
    '  local s=$(du -m "$mp" | cut -f1)',
    '  [[ "$s" -lt 500 ]] && { rm -f "$mp"; log_error "Archivo incompleto (${s} MB)"; exit 1; }',
    '  chown "${TARGET_USER}:${TARGET_USER}" "$mp" 2>/dev/null || true',
    '  log_ok "Modelo listo (${s} MB)"',
    '}',
  ].join('\n');
}

function buildPullAndVerify(p) {
  var searxngImage = p.rag ? ' "docker.io/searxng/searxng:latest"' : '';
  return [
    'pull_images() {',
    '  log_info "Descargando im\u00e1genes de contenedores..."',
    '  local img; img=$(grep -m1 \'image:\' "${COMPOSE_FILE}" | sed \'s/^[[:space:]]*image:[[:space:]]*//\')',
    '  for i in "$img" "ghcr.io/open-webui/open-webui:main"' + searxngImage + '; do',
    '    [[ -n "$i" ]] && podman pull "$i" 2>/dev/null || true',
    '  done',
    '}',
    '',
    'start_and_verify() {',
    '  systemctl start ai-stack.service || { log_error "Fallo al iniciar"; exit 1; }',
    '  log_info "Esperando contenedores (5 min m\u00e1x)..."',
    '  local e=0 m=300 s=10',
    '  while [[ $e -lt $m ]]; do',
    '    sleep $s; e=$((e + s))',
    '    podman ps | grep -q ai-stack-llama-cpp && podman ps | grep -q ai-stack-open-webui && { log_ok "Contenedores activos"; break; }',
    '  done',
    '  [[ $e -ge $m ]] && log_warn "Tiempo agotado. Ver: podman ps && journalctl -u ai-stack -n 100"',
    '  curl -fsS "http://localhost:${LLAMA_PORT}/v1/models" >/dev/null 2>&1 && log_ok "llama.cpp responde" || log_warn "llama.cpp no responde a\u00fan"',
    '  curl -fsS "http://localhost:${WEBUI_PORT}/health" >/dev/null 2>&1 && log_ok "Open WebUI responde en http://localhost:${WEBUI_PORT}" || log_warn "Open WebUI no responde a\u00fan"',
    '}',
  ].join('\n');
}

function buildMainExec(p) {
  var gpuCmds = p.gpu ? [
    'upgrade_podman_for_cdi',
    'calculate_gpu_layers',
    'install_nvidia_drivers',
    'install_nvidia_container_toolkit',
  ].join('\n') : '';
  var ragCmd = p.rag ? 'configure_searxng' : '';

  return [
    'detect_gpu',
    'calculate_gpu_layers',
    '',
    'echo "Modo de instalaci\u00f3n: autom\u00e1tico"',
    'install_packages',
    'install_podman_compose',
    gpuCmds,
    'create_directories',
    ragCmd,
    'generate_compose',
    'download_model',
    p.firewall ? 'configure_ufw' : '',
    p.opencode ? 'install_opencode' : '',
    'create_systemd_service',
    'pull_images',
    'start_and_verify',
  ].filter(Boolean).join('\n');
}

function generate() {
  var p = {
    llama_port:   document.getElementById('llama_port').value,
    webui_port:   document.getElementById('webui_port').value,
    hf_repo:      document.getElementById('hf_repo').value,
    model_name:   document.getElementById('model_name').value,
    model_size:   document.getElementById('model_size').value,
    ctx_size:     document.getElementById('ctx_size').value,
    cpu_threads:  parseInt(document.getElementById('cpu_threads').value) || 0,
    vram_thr:     document.getElementById('vram_threshold').value,
    gpu:          document.getElementById('enable_gpu').checked,
    rag:          document.getElementById('enable_rag').checked,
    opencode:     document.getElementById('enable_opencode').checked,
    firewall:     document.getElementById('enable_firewall').checked,
  };

  var parts = [
    buildHeader(p),
    '',
    buildDetectGpu(),
    '',
    buildInstallPackages(p),
    '',
    buildPodmanCompose(),
    '',
    p.gpu ? buildUpgradePodman() : '',
    p.gpu ? buildNvidiaDrivers() : '',
    p.gpu ? buildNvidiaCtk() : '',
    p.rag ? buildSearxng() : 'configure_searxng() { :; }',
    '',
    buildCompose(p),
    '',
    buildDownloadModel(),
    '',
    buildFirewall(p),
    '',
    buildOpenCode(p),
    '',
    buildSystemdService(),
    '',
    buildPullAndVerify(p),
    '',
    '# ==============================================================================',
    '# EJECUCI\u00d3N PRINCIPAL',
    '# ==============================================================================',
    buildMainExec(p),
    '',
    '# ==============================================================================',
    '# INFORME FINAL',
    '# ==============================================================================',
    'local_ip=$(hostname -I | awk \'{print $1}\')',
    'echo ""',
    'echo -e "${GREEN}=============================================================================="',
    'echo -e " AI STACK DESPLEGADO"',
    'echo -e "==============================================================================${NC}"',
    'echo ""',
    'echo "  llama.cpp:   http://${local_ip}:${LLAMA_PORT}"',
    'echo "  Open WebUI:  http://${local_ip}:${WEBUI_PORT}"',
    'echo "  Modelo:      ${MODEL_NAME}"',
    'echo "  GPU:         $([[ ${HAS_NVIDIA_GPU} == 1 ]] && echo \'NVIDIA\' || echo \'CPU\')"',
    'echo ""',
    'echo "  sudo systemctl start ai-stack   # Iniciar"',
    'echo "  sudo systemctl stop ai-stack    # Detener"',
    'echo ""',
    '[[ "${NEEDS_REBOOT}" == "1" ]] && echo "  >> REQUIERE REINICIO: sudo reboot <<"',
    'echo -e "${GREEN}==============================================================================${NC}"',
  ];

  var script = parts.filter(function(x) { return x !== ''; }).join('\n');

  generatedScript = script;
  document.getElementById('output').value = script;
  document.getElementById('status').innerHTML = '<span class="copy-ok">\u2713 Script generado (' + script.split('\n').length + ' l\u00edneas)</span>';
}

var generatedScript = '';

function copyScript() {
  if (!generatedScript) { document.getElementById('status').innerHTML = '<span class="copy-err">\u2717 Gener\u00e1 el script primero</span>'; return; }
  navigator.clipboard.writeText(generatedScript).then(function() {
    document.getElementById('status').innerHTML = '<span class="copy-ok">\u2713 Copiado al portapapeles</span>';
  }).catch(function() {
    document.getElementById('status').innerHTML = '<span class="copy-err">\u2717 Error al copiar</span>';
  });
}

function downloadScript() {
  if (!generatedScript) { document.getElementById('status').innerHTML = '<span class="copy-err">\u2717 Gener\u00e1 el script primero</span>'; return; }
  var blob = new Blob([generatedScript], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-stack-deployer.sh';
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById('status').innerHTML = '<span class="copy-ok">\u2713 Script descargado: ai-stack-deployer.sh</span>';
}

window.onload = generate;
</script>
</body>
</html>
